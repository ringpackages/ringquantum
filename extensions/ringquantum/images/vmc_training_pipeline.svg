<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680">
<defs>
  <linearGradient id="linearGradient1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#070A13"/><stop offset="100%" stop-color="#151B2E"/></linearGradient>
  <pattern id="grid1" width="35" height="35" patternUnits="userSpaceOnUse"><rect width="35" height="35" fill="url(#linearGradient1)"/><path d="M 35 0 L 0 0 0 35" fill="none" stroke="#242B3D" stroke-width="1"/></pattern>
  <filter id="shadow1" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="5" dy="5" stdDeviation="8" flood-color="#020617"/></filter>
  <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/></marker>
  <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/></marker>
  <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#F43F5E"/></marker>
</defs>
  <rect x="0" y="0" width="1100" height="680" fill="url(#linearGradient1)"/>
  <rect x="0" y="0" width="1100" height="680" fill="url(#grid1)" opacity="0.20"/>
  <text x="550" y="45" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#F8FAFC">🧠 VARIATIONAL MONTE CARLO (VMC) OPTIMIZATION LOOP</text>
  <text x="550" y="75" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" dominant-baseline="middle" fill="#94A3B8">RBM Wavefunction ground-state search with direct visible constraints &amp; center-normalized REINFORCE</text>
  <rect x="50" y="140" width="180" height="80" rx="8" ry="8" fill="#0369A1" stroke="#0EA5E9" stroke-width="1.50" filter="url(#shadow1)"/>
  <text x="140" y="170" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#FFFFFF">1. START EPOCH</text>
  <text x="140" y="192" font-family="Courier New" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#BAE6FD">Reset: gW, ga, gb = 0</text>
  <text x="140" y="207" font-family="'Segoe UI', sans-serif" font-size="9" text-anchor="middle" dominant-baseline="middle" fill="#93C5FD">Prepare batch samples</text>
  <rect x="280" y="140" width="230" height="110" rx="8" ry="8" fill="#1E293B" stroke="#475569" stroke-width="1" filter="url(#shadow1)"/>
  <text x="395" y="162" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#38BDF8">2. SAMPLING &amp; ANSATZ</text>
  <text x="395" y="185" font-family="Courier New" font-size="9.50" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#F59E0B">ψ(s) = exp(Σ aᵢsᵢ) Π cosh(bⱼ+ΣWᵢⱼsᵢ)</text>
  <text x="395" y="207" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#CBD5E1">• Metropolis MCMC (Ising {-1,1})</text>
  <text x="395" y="227" font-family="Courier New" font-size="9.50" text-anchor="middle" dominant-baseline="middle" fill="#38BDF8">• Accept: α = min(1, |ψ(s&apos;)|²/|ψ(s)|²)</text>
  <rect x="550" y="140" width="230" height="110" rx="8" ry="8" fill="#1E293B" stroke="#475569" stroke-width="1" filter="url(#shadow1)"/>
  <text x="665" y="162" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#F59E0B">3. PORTFOLIO ENERGY</text>
  <text x="665" y="185" font-family="Courier New" font-size="9.50" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#34D399">E_local = 2·Σ Jᵢⱼxᵢxⱼ + Σ Jᵢᵢxᵢ</text>
  <text x="665" y="207" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#CBD5E1">Binary map: xᵢ = (sᵢ==1) ? 1:0</text>
  <text x="665" y="227" font-family="Courier New" font-size="9.50" text-anchor="middle" dominant-baseline="middle" fill="#F472B6">+ Constraint Penalty: λ·|nAct-K|²</text>
  <rect x="820" y="140" width="230" height="110" rx="8" ry="8" fill="#1E293B" stroke="#475569" stroke-width="1" filter="url(#shadow1)"/>
  <text x="935" y="162" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#A855F7">4. ADVANTAGE ENGINE</text>
  <text x="935" y="185" font-family="Courier New" font-size="10" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#F59E0B">adv = (E_local - avgE) / stdE</text>
  <text x="935" y="207" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#CBD5E1">Z-score prevents gradient explode</text>
  <text x="935" y="227" font-family="'Segoe UI', sans-serif" font-size="9" text-anchor="middle" dominant-baseline="middle" fill="#E9D5FF">Keeps gradients in range [-4, +4]</text>
  <rect x="820" y="310" width="230" height="100" rx="8" ry="8" fill="#1E293B" stroke="#F43F5E" stroke-width="1.50" filter="url(#shadow1)"/>
  <text x="935" y="332" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#F43F5E">5. HYBRID GRADIENT</text>
  <text x="935" y="357" font-family="Courier New" font-size="10" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#FFAEAE">ga_re[i] += selectionError * 0.05</text>
  <text x="935" y="378" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#CBD5E1">Direct visible bias SGD constraint</text>
  <text x="935" y="393" font-family="'Segoe UI', sans-serif" font-size="9" text-anchor="middle" dominant-baseline="middle" fill="#FBCFE8">Ensures target K assets are selected</text>
  <rect x="550" y="310" width="230" height="100" rx="8" ry="8" fill="#1E293B" stroke="#475569" stroke-width="1" filter="url(#shadow1)"/>
  <text x="665" y="332" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#10B981">6. ZERO-COPY UPDATE</text>
  <text x="665" y="357" font-family="Courier New" font-size="10" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#A7F3D0">tensor_update_adam(W, gW, ...)</text>
  <text x="665" y="378" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#CBD5E1">In-place memory update in C</text>
  <text x="665" y="393" font-family="'Segoe UI', sans-serif" font-size="9" text-anchor="middle" dominant-baseline="middle" fill="#A7F3D0">No memory serialization copies</text>
  <rect x="280" y="310" width="230" height="100" rx="8" ry="8" fill="#1E293B" stroke="#475569" stroke-width="1" filter="url(#shadow1)"/>
  <text x="395" y="332" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#E2E8F0">7. STABILITY CHECK</text>
  <text x="395" y="357" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#CBD5E1">Is energy minimized &amp; stable?</text>
  <text x="395" y="378" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#CBD5E1">Are exactly K assets hit?</text>
  <text x="395" y="393" font-family="'Segoe UI', sans-serif" font-size="9" text-anchor="middle" dominant-baseline="middle" fill="#94A3B8">Measures standard deviation σ</text>
  <rect x="50" y="310" width="180" height="100" rx="8" ry="8" fill="#064E3B" stroke="#10B981" stroke-width="1.50" filter="url(#shadow1)"/>
  <text x="140" y="338" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#FFFFFF">8. OPTIMAL PORTFOLIO</text>
  <text x="140" y="358" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#A7F3D0">Stable Ground State</text>
  <path d="M 129.50 383 L 137 390.50 L 150.50 375.50" fill="none" stroke="#34D399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="230" y1="180" x2="280" y2="180" fill="#000000" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="510" y1="180" x2="550" y2="180" fill="#000000" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="780" y1="180" x2="820" y2="180" fill="#000000" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="935" y1="250" x2="935" y2="310" fill="#000000" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="820" y1="360" x2="780" y2="360" fill="#000000" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="550" y1="360" x2="510" y2="360" fill="#000000" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="280" y1="360" x2="230" y2="360" fill="#000000" stroke="#10B981" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="320" y="480" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="middle" dominant-baseline="middle" fill="#F43F5E">No (Loop to next epoch)</text>
  <rect x="50" y="505" width="1000" height="125" rx="8" ry="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="70" y="532" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#F8FAFC">Variational Monte Carlo Ground State Mathematical Formulations (v5.0):</text>
  <text x="70" y="555" font-family="Courier New" font-size="10" font-weight="bold" fill="#F59E0B">1. Centered Wavefunction Gradient:  O_W(s) = ∂ ln ψ(s) / ∂ W_ij = s_i * tanh(θ_j)  where activations θ_j = b_j + Σ W_ij * s_i</text>
  <text x="70" y="578" font-family="Courier New" font-size="10" font-weight="bold" fill="#34D399">2. Variational Force Vector:         ∇_W E = 2 * Real [ ⟨ E_local * O_W ⟩ - ⟨ E_local ⟩ * ⟨ O_W ⟩ ]</text>
  <text x="70" y="601" font-family="Courier New" font-size="10" font-weight="bold" fill="#38BDF8">3. Constraint SGD Correction:        For visible bias: ga_re[i] += (AverageActive - TargetK) * CorrectionForce</text>
</svg>